<!DOCTYPE html>
<html lang="en">
  <head>
   <meta charset="utf-8">
   <meta content="viewport" width="width=device-width, initial-scale=1.0">
   <title>NFT Preview Card</title>
   <link rel="stylesheet" href="styles.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <div class="card">
        <div class="card-container">
          <img class="cube" src="image-equilibrium.jpg" alt="clear glass cube laying diagonally on a flat surface">
          <p class="title">Equilibrium #3429</p>
          <p class="info">Our Equilibrium collection promotes balance and calm.</p>
         <div class="stats">
          <p class="cost"><img class="icon" src="icon-ethereum.svg"> 0.041 ETH</p>
          <p class="time"><img class="clock" src="icon-clock.svg" alt="a small image of a clock"> 3 days left</p>
         </div>
          <hr>
         <div class="creator">
          <img class="picture" src="image-avatar.png" alt="profile picture">
          <p class="name">Creation of <span class="author">Jules Wyvern</span></p>
         </div>
        </div>
      </div>
    </main>
  </body>
