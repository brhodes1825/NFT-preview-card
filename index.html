<!DOCTYPE html>
<html lang="en">
  <head>
   <meta charset="utf-8">
   <meta content="viewport" width="width=device-width, initial-scale=1.0">
   <title>NFT Preview Card</title>
   <link rel="stylesheet" href="styles.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <div class="card">
        <div class="card-container">
          <img src="image-equilibrium.jpg" alt="clear glass cube laying diagonally on a flat surface">
          <p>Equilibrium #3429</p>
          <p>Our Equilibrium collection promotes balance and calm.</p>
          <img src="icon-ethereum.svg">
          <p>0.041 ETH</p>
          <img src="icon-clock.svg" alt="a small image of a clock">
          <p>3 days left</p>
          <hr>
          <img src="image-avatar.jpg" alt="profile picture">
          <p>Creation of Jules Wyvern</p>
        </div>
      </div>
    </main>
  </body>
